<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechData Singapore - IBM Team Landing Page</title>
  <meta property="og:title" content="TechData Singapore - IBM Team Landing Page" />
  <meta property="og:type" content="website" />
  <!-- Marked.js: renders Markdown body content -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- js-yaml: properly parses YAML front matter -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <style>
    /* ── TD SYNNEX Brand Tokens ───────────────────────────────────────
       Primary Blue (Teal): #08BED5
       Deep Teal:           #005758
       White:               #ffffff
       Light BG:            #f0fafb
       Border:              #b2e8ed
       Text:                #1a1a1a
       Muted text:          #4a6366
    ──────────────────────────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      background: #f0fafb;
      color: #1a1a1a;
      line-height: 1.65;
      font-size: 15px;
    }

    /* ── Top brand bar ── */
    .brand-bar {
      background: #005758;
      height: 5px;
      width: 100%;
    }

    /* ── Top nav strip ── */
    .nav-strip {
      background: #ffffff;
      border-bottom: 1px solid #b2e8ed;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-strip .brand-name {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #005758;
    }

    .nav-strip .brand-tag {
      font-size: 0.75rem;
      color: #4a6366;
      letter-spacing: 0.04em;
    }

    /* ── Hero image ── */
    .hero-image {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      object-position: center;
      display: block;
      background: #005758;
    }

    /* ── Page accent divider ── */
    .accent-bar {
      height: 4px;
      background: #08BED5;
      width: 100%;
    }

    /* ── Main content area ── */
    main {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 24px;
    }

    /* ── Cards ── */
    .card {
      background: #ffffff;
      border: 1px solid #b2e8ed;
      border-top: 3px solid #08BED5;
      border-radius: 4px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #005758;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #b2e8ed;
    }

    /* ── Rich text body styles ── */
    #body-content h1,
    #body-content h2,
    #body-content h3,
    #body-content h4 {
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-weight: 700;
      color: #005758;
      margin: 24px 0 10px;
    }
    #body-content h1 { font-size: 1.6rem; border-bottom: 2px solid #08BED5; padding-bottom: 6px; }
    #body-content h2 { font-size: 1.25rem; border-left: 4px solid #08BED5; padding-left: 10px; }
    #body-content h3 { font-size: 1.05rem; color: #08BED5; }
    #body-content h4 { font-size: 0.95rem; color: #4a6366; }
    #body-content p  { margin: 0 0 14px; }
    #body-content ul,
    #body-content ol { padding-left: 24px; margin-bottom: 14px; }
    #body-content li { margin-bottom: 4px; }
    #body-content a  { color: #08BED5; text-decoration: none; font-weight: 500; }
    #body-content a:hover { color: #005758; text-decoration: underline; }
    #body-content strong { color: #005758; }
    #body-content hr {
      border: none;
      border-top: 2px solid #b2e8ed;
      margin: 24px 0;
    }
    #body-content blockquote {
      border-left: 4px solid #08BED5;
      padding: 10px 16px;
      background: #f0fafb;
      color: #4a6366;
      margin: 16px 0;
      border-radius: 0 4px 4px 0;
    }
    #body-content code {
      background: #f0fafb;
      border: 1px solid #b2e8ed;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: "Courier New", monospace;
    }
    #body-content pre {
      background: #f0fafb;
      border: 1px solid #b2e8ed;
      padding: 16px;
      border-radius: 4px;
      overflow-x: auto;
    }

    /* ── Inline images ── */
    #body-content img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      margin: 16px 0;
      border: 1px solid #b2e8ed;
    }

    /* ── Links section ── */
    .links-list { list-style: none; padding: 0; }
    .links-list li { margin-bottom: 10px; }
    .links-list a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #005758;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 6px 0;
    }
    .links-list a::before {
      content: "›";
      font-size: 1.2em;
      color: #08BED5;
      font-weight: 700;
    }
    .links-list a:hover { color: #08BED5; }

    /* ── Attachments section ── */
    .attachments-list { list-style: none; padding: 0; }
    .attachments-list li { margin-bottom: 10px; }
    .attachments-list a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f0fafb;
      border: 1px solid #b2e8ed;
      border-left: 4px solid #08BED5;
      border-radius: 4px;
      padding: 10px 16px;
      color: #005758;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .attachments-list a::before {
      content: "↓";
      font-size: 1rem;
      color: #08BED5;
      font-weight: 700;
    }
    .attachments-list a:hover {
      background: #08BED5;
      color: #ffffff;
      border-left-color: #005758;
    }
    .attachments-list a:hover::before { color: #ffffff; }

    .hidden { display: none; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: #4a6366;
      border-top: 3px solid #005758;
      padding: 20px 24px;
      margin-top: 48px;
      background: #ffffff;
    }

    footer .footer-brand {
      font-weight: 700;
      color: #005758;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- TD SYNNEX brand bar -->
  <div class="brand-bar"></div>

  <!-- Nav strip -->
  <div class="nav-strip">
    <span class="brand-name">TD SYNNEX &nbsp;|&nbsp; IBM</span>
    <span class="brand-tag">Partner Portal</span>
  </div>

  <!-- Hero image sits flush below nav -->
  <img id="hero-img" class="hero-image hidden" alt="Hero image" />

  <!-- Accent divider below hero -->
  <div class="accent-bar"></div>

  <main>
    <!-- Body / Rich Text -->
    <div class="card" id="body-card">
      <div id="body-content">Loading content…</div>
    </div>

    <!-- Links -->
    <div class="card hidden" id="links-card">
      <h2>Useful Links</h2>
      <ul class="links-list" id="links-list"></ul>
    </div>

    <!-- Attachments -->
    <div class="card hidden" id="attachments-card">
      <h2>Downloads</h2>
      <ul class="attachments-list" id="attachments-list"></ul>
    </div>
  </main>

  <footer>
    <span class="footer-brand">TD SYNNEX</span> &nbsp;&mdash;&nbsp; IBM Partner Portal
  </footer>

  <script>
    // ---------- Front matter + markdown parser ----------
    function parseFrontMatter(raw) {
      const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
      if (!match) return { meta: {}, body: raw };
      try {
        const meta = jsyaml.load(match[1]) || {};
        return { meta, body: match[2] };
      } catch (e) {
        console.warn('Front matter parse error:', e);
        return { meta: {}, body: raw };
      }
    }

    fetch('/content/page.md')
      .then(r => {
        if (!r.ok) throw new Error('Could not load page content.');
        return r.text();
      })
      .then(text => {
        const { meta, body } = parseFrontMatter(text);

        // Browser tab title
        document.title = meta.title || 'TechData Singapore - IBM Team Landing Page';

        // Hero image
        if (meta.hero_image) {
          const img = document.getElementById('hero-img');
          img.src = meta.hero_image;
          img.classList.remove('hidden');
        }

        // Body (rich text / markdown)
        document.getElementById('body-content').innerHTML =
          body.trim() ? marked.parse(body) : '<p><em>No content yet. Visit /admin to add content.</em></p>';

        // Links
        const links = Array.isArray(meta.links) ? meta.links : [];
        if (links.length > 0) {
          const ul = document.getElementById('links-list');
          links.forEach(link => {
            if (!link.url) return;
            const li = document.createElement('li');
            li.innerHTML = `<a href="${link.url}" target="_blank" rel="noopener noreferrer">${link.label || link.url}</a>`;
            ul.appendChild(li);
          });
          document.getElementById('links-card').classList.remove('hidden');
        }

        // Attachments
        const attachments = Array.isArray(meta.attachments) ? meta.attachments : [];
        if (attachments.length > 0) {
          const ul = document.getElementById('attachments-list');
          attachments.forEach(att => {
            if (!att.file) return;
            const li = document.createElement('li');
            li.innerHTML = `<a href="${att.file}" download>${att.name || att.file}</a>`;
            ul.appendChild(li);
          });
          document.getElementById('attachments-card').classList.remove('hidden');
        }
      })
      .catch(err => {
        document.getElementById('body-content').innerHTML =
          `<p style="color:#d73a49">${err.message}</p>`;
      });
  </script>
</body>
</html>
